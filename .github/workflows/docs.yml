name: docs

on:
  push:
    branches:
      - development
      - main
  workflow_dispatch:

# Allow only one concurrent deployment, cancel runs already in progress.
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write  # for mkdocs gh-deploy to push to gh-pages

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install C++ build deps (Eigen3 headers for distmesh extension)
        run: sudo apt-get install -y libeigen3-dev

      - name: Install package + dev extras (includes mkdocs-material, mkdocstrings)
        run: |
          python -m pip install --upgrade pip
          pip install pybind11
          pip install -e ".[dev]"

      - name: Generate interactive-demo frames (#118)
        # Runs the real distmesh driver on a few analytic domains and writes
        # docs/demo/data/*.json for client-side playback. Regenerated every
        # build so the demo always reflects the current solver.
        run: python scripts/gen_demo_frames.py

      - name: Build docs
        run: mkdocs build

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install C++ build deps
        run: sudo apt-get install -y libeigen3-dev

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install pybind11
          pip install -e ".[dev]"

      - name: Generate interactive-demo frames
        run: python scripts/gen_demo_frames.py

      - name: Deploy to gh-pages
        run: mkdocs gh-deploy --force
