name: docs

on:
  push:
    branches:
      - daily-issue-fixing
      - daily-maintenance
      - main
  workflow_dispatch:

# Allow only one concurrent deployment, cancel runs already in progress.
concurrency:
  group: docs
  cancel-in-progress: true

permissions:
  contents: write  # for mkdocs gh-deploy to push to gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # mkdocs needs full history for the "edit this page" link

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install C++ build deps (Eigen3 headers for distmesh extension)
        run: sudo apt-get install -y libeigen3-dev

      - name: Install package + dev extras (includes mkdocs-material, mkdocstrings)
        run: |
          python -m pip install --upgrade pip
          pip install pybind11
          pip install -e ".[dev]"

      - name: Generate interactive-demo frames (#118)
        # Runs the real distmesh driver on a few analytic domains and writes
        # docs/demo/data/*.json for client-side playback. Regenerated every
        # build so the demo always reflects the current solver.
        run: python scripts/gen_demo_frames.py

      - name: Build docs
        # --strict disabled until pre-existing docs/ link warnings are
        # repaired (PFIX_CONTRACT.md, PUBLISH_RELEASE.md broken `../`
        # links; tracked separately).
        run: mkdocs build

      - name: Deploy to gh-pages (daily-issue-fixing, daily-maintenance, or main)
        if: github.ref == 'refs/heads/daily-issue-fixing' || github.ref == 'refs/heads/daily-maintenance' || github.ref == 'refs/heads/main'
        run: mkdocs gh-deploy --force
