name: tests-slow

on:
  workflow_dispatch:
  schedule:
    # Mondays 04:00 UTC.
    - cron: '0 4 * * 1'
  push:
    tags:
      - 'v*'

jobs:
  pytest-full:
    name: pytest full suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest (full suite — includes slow)
        run: pytest -q --tb=short
