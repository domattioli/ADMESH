name: tests-slow

on:
  workflow_dispatch:
  schedule:
    # Mondays 04:00 UTC.
    - cron: '0 4 * * 1'
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest-full:
    name: pytest full suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev + registry extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,registry]"

      - name: Run pytest (full suite — overrides default `not slow` filter)
        run: pytest -q --tb=short -o "addopts=-ra"
