name: Validate Registry Manifest

on:
  pull_request:
    paths:
      - 'registry_data/manifest.toml'
      - 'registry_data/manifests/**/*.toml'
      - 'mesh_registry/validator.py'
      - '.github/workflows/validate-pr.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -e ".[registry]"

      - name: Run registry validator
        id: validate
        run: |
          python -m mesh_registry.cli validate registry_data/manifest.toml
        continue-on-error: true

      - name: Post validation comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Registry manifest validated successfully'
            })

      - name: Fail if validation failed
        if: steps.validate.outcome == 'failure'
        run: exit 1
