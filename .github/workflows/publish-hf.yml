name: Publish to HuggingFace Datasets

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -e ".[registry]"

      - name: Run pre-flight validation
        run: |
          python -m mesh_registry.cli validate registry_data/manifest.toml

      - name: Publish to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -m mesh_registry.cli publish \
            --manifest registry_data/manifest.toml \
            --dataset-slug adcirc-meshes \
            --tag ${{ github.ref_name }}

      - name: Create GitHub release annotation
        uses: actions/github-script@v6
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            github.rest.repos.createReleaseComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id,
              body: `✅ Published to HuggingFace Datasets: [adcirc-meshes](https://huggingface.co/datasets/adcirc-meshes/)`
            })
        continue-on-error: true
