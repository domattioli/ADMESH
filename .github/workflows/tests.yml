# DomI-managed workflow (spec-010 v3) — materialized from template; DO NOT EDIT IN THIS REPO.
# Source: domattioli/DomI templates/workflows/tests.yml @ v1 — edit upstream, then sync.
name: tests

on:
  # MINIMAL CI (#265, 2026-07-03): PR-to-main gate only. No push: — dev pushes
  # already hit the open rolling development→main PR's synchronize event.
  # Multi-python / cross-OS coverage belongs on release gating, not every PR.
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest (standard lane — skip slow)
        run: pytest -m "not slow" -q --tb=short

      - name: Upload coverage artifact (3.11 only)
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-json
          path: coverage.json
          if-no-files-found: ignore
