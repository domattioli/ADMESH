# Weekday Attention Digest (DomI#164)
#
# Runs Mon–Fri and emails the owner a digest of open issues needing attention
# (marked with `status: needs-operator`) across all six repos. No GitHub issue created.
#
# REQUIRED SECRETS:
#   DIGEST_PAT    — fine-grained PAT with Issues: Read on all six repos
#   RESEND_API_KEY — Resend API key
#   MAIL_TO       — destination email address

name: Weekday Attention Digest

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  digest:
    name: Build and email attention digest
    runs-on: ubuntu-latest

    steps:
      - name: Build digest
        id: build
        env:
          GH_TOKEN: ${{ secrets.DIGEST_PAT || secrets.GITHUB_TOKEN }}
          OWNER: domattioli
        run: |
          REPOS="DomI ADMESH ADMESH-Domains CHILmesh MADMESHing QuADMESH"
          DATE="$(date -u +%Y-%m-%d)"

          BODY="Owner Attention Digest — ${DATE}"$'\n\n'
          TOTAL=0

          for REPO in ${REPOS}; do
            MATCHES="$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${OWNER}/${REPO}/issues?state=open&per_page=100&page=1" \
              | jq -r '.[] | select(
                  (.pull_request == null) and
                  ([.labels[].name] | any(
                      . == "status: needs-operator")))
                | "- #\(.number) \(.title)\n  \(.html_url)"' 2>/dev/null)" || MATCHES=""

            MATCHES2="$(curl -s -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${OWNER}/${REPO}/issues?state=open&per_page=100&page=2" \
              | jq -r '.[] | select(
                  (.pull_request == null) and
                  ([.labels[].name] | any(
                      . == "status: needs-operator")))
                | "- #\(.number) \(.title)\n  \(.html_url)"' 2>/dev/null)" || MATCHES2=""

            COMBINED="$(printf '%s\n%s' "${MATCHES}" "${MATCHES2}" | grep -v '^$')" || COMBINED=""

            if [ -n "${COMBINED}" ]; then
              COUNT="$(printf '%s\n' "${COMBINED}" | grep -c '^-')"
              TOTAL=$((TOTAL + COUNT))
              BODY="${BODY}=== ${REPO} (${COUNT}) ==="$'\n'"${COMBINED}"$'\n\n'
            fi
          done

          if [ "${TOTAL}" -eq 0 ]; then
            BODY="${BODY}No issues flagged for your attention today."$'\n'
          fi

          BODY="${BODY}"$'\n'"Auto-generated by weekday-attention-digest.yml"

          # Write to file to avoid shell escaping issues when passing to next step
          printf '%s' "${BODY}" > /tmp/digest_body.txt
          echo "total=${TOTAL}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

      - name: Send digest email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SUBJECT: "digest: owner attention — ${{ steps.build.outputs.date }} (${{ steps.build.outputs.total }} items)"
        run: |
          BODY_CONTENT="$(cat /tmp/digest_body.txt)"
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"DomI Digest <onboarding@resend.dev>\",
              \"to\": [\"${MAIL_TO}\"],
              \"subject\": \"${SUBJECT}\",
              \"text\": $(printf '%s' "${BODY_CONTENT}" | jq -Rs .)
            }"
