name: skill-issue-closure-audit

# Layer 4 of the Skill Issue Closure enforcement stack.
# Triggers on any close of a `request: skill` issue. Compares the manual close
# reason vs. the framework recommendation. Posts a warning comment if they
# don't match (post-hoc audit).
#
# Spec: specs/003-skill-issue-closure/spec.md
# Protocol: CLAUDE.md → "Skill Issue Closure Protocol"

on:
  issues:
    types: [closed]

jobs:
  audit:
    name: Audit closure against framework
    runs-on: ubuntu-latest
    if: "${{ contains(toJson(github.event.issue.labels), 'request: skill') }}"
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run framework evaluation
        id: framework
        run: |
          python -c "
          import json, sys, os
          sys.path.insert(0, 'skills/skill-issue-closure/src')
          from datetime import datetime
          from decision_engine import DecisionEngine
          from models import Issue

          # Load issue context from event payload
          event_path = os.environ['GITHUB_EVENT_PATH']
          with open(event_path) as f:
            event = json.load(f)
          issue_data = event['issue']

          # Build Issue object
          issue = Issue(
            number=issue_data['number'],
            title=issue_data['title'],
            created_at=datetime.fromisoformat(issue_data['created_at'].replace('Z', '+00:00')),
            labels=[l['name'] for l in issue_data['labels']],
            status='closed',
            comments=[],
          )

          # Evaluate
          engine = DecisionEngine(repo_root='.')
          decision = engine.evaluate(issue)

          # Map close reason to expected framework decision
          close_reason = issue_data.get('state_reason', 'completed')
          expected = {
            'completed': 'READY_TO_BUILD',
            'duplicate': 'DUPLICATE',
            'not_planned': 'STALE',
          }.get(close_reason, 'UNKNOWN')

          # Determine if mismatch
          mismatch = decision.decision_type != expected and expected != 'UNKNOWN'

          # Output for next step
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f'decision={decision.decision_type}\n')
            f.write(f'expected={expected}\n')
            f.write(f'close_reason={close_reason}\n')
            f.write(f'reasoning={decision.reason}\n')
            f.write(f'mismatch={\"true\" if mismatch else \"false\"}\n')
          "

      - name: Post audit comment if mismatch
        if: steps.framework.outputs.mismatch == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue.number;
            const decision = '${{ steps.framework.outputs.decision }}';
            const expected = '${{ steps.framework.outputs.expected }}';
            const closeReason = '${{ steps.framework.outputs.close_reason }}';
            const reasoning = `${{ steps.framework.outputs.reasoning }}`;

            const body = `⚠ **Closure Audit: framework mismatch**

            This issue was closed with reason \`${closeReason}\` (framework expected: \`${expected}\`), but the framework recommendation is \`${decision}\`.

            **Reasoning**: ${reasoning}

            **Possible explanations:**
            - Manual closure bypassed the \`/skill-issue-closure\` framework
            - Vote count or skill registry changed since closure
            - Operator override (legitimate — please add a comment explaining why)

            See [CLAUDE.md → Skill Issue Closure Protocol](../blob/main/CLAUDE.md#skill-issue-closure-protocol) and [spec](../blob/main/specs/003-skill-issue-closure/spec.md).

            *This is a post-hoc audit and does not reverse the closure. If the closure was incorrect, reopen the issue.*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: body,
            });

      - name: Log audit result
        run: |
          echo "Decision: ${{ steps.framework.outputs.decision }}"
          echo "Expected: ${{ steps.framework.outputs.expected }}"
          echo "Close reason: ${{ steps.framework.outputs.close_reason }}"
          echo "Mismatch: ${{ steps.framework.outputs.mismatch }}"
