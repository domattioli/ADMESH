name: Feature Request
description: Propose a non-port enhancement (new API, new I/O, new selection mechanism, etc.).
title: "[feat] "
labels: ["type:enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For faithful ports of MATLAB stages, use the **Port /
        Faithful Re-implementation** template instead. For open-ended
        research prompts, use **Research / Exploration**.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Who is affected? Include
        concrete evidence (a failing workflow, a missing API, a sibling
        project that needs a hook).
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: API sketch, file changes, or a paragraph of design.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which area of the codebase does this primarily affect?
      options:
        - "io"
        - "numerics"
        - "scope:tests"
        - "scope:docs"
        - "performance"
        - "integration"
        - "roadmap"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "severity:low"
        - "severity:medium"
        - "severity:high"
        - "severity:critical"
      default: 0
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "priority:low"
        - "priority:medium"
        - "priority:high"
        - "priority:critical"
      default: 1
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checklist that, once green, lets this issue close.
      placeholder: |
        - [ ] ...
        - [ ] Tests added/updated.
        - [ ] Docs updated.
        - [ ] `pytest -q` exits 0.
